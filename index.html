<!-- index.html -->
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Bat Yam 100</title>
  <link rel="icon" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <meta name="theme-color" content="#0d1b2a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Bat Yam 100" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Rubik:wght@400;600;800;900&family=Frank+Ruhl+Libre:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --ink:#0d1b2a; --blue:#0057a8; --sky:#2196f3;
      --gold:#f5a623; --mint:#00b89c; --bg:#f4f6f9;
      --card:#ffffff; --border:#e4e9f0; --muted:#7a8899; --danger:#ef4444;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);font-family:'Heebo',sans-serif;color:var(--ink);-webkit-tap-highlight-color:transparent;overscroll-behavior-y:none;}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}

    #ldr{position:fixed;inset:0;background:var(--ink);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s;}
    #ldr .ring{width:60px;height:60px;border:3px solid rgba(255,255,255,.12);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:18px;}
    #ldr p{color:rgba(255,255,255,.45);font-size:10px;font-weight:800;letter-spacing:.2em;text-transform:uppercase}

    .topWrap{position:relative;background:linear-gradient(180deg,rgba(13,27,42,1) 0%,rgba(13,27,42,1) 65%,rgba(13,27,42,0) 100%);padding-bottom:10px;}
    .hero{position:relative;height:220px;border-radius:0 0 28px 28px;overflow:hidden;background:var(--ink);box-shadow:0 18px 44px -14px rgba(13,27,42,.55);margin:0 14px;}
    .hero-bg{background-image:url('baner.jpg');background-size:cover;background-position:center;position:absolute;inset:0;opacity:.55;}
    .hero-stripe{position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--gold) 0%,var(--mint) 50%,var(--sky) 100%);}
    .hero-c{position:relative;z-index:2;padding:18px;height:100%;display:flex;flex-direction:column;justify-content:space-between;}
    .glass-pill{background:rgba(255,255,255,.14);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.22);color:white;border-radius:40px;display:inline-flex;align-items:center;gap:7px;padding:7px 14px;font-size:12px;font-weight:800;cursor:pointer;transition:all .18s;border:none;}
    .glass-pill:active{transform:scale(.94)}
    .glass-ic{background:rgba(255,255,255,.14);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.22);color:white;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;font-size:18px;}
    .glass-ic:active{transform:scale(.92)}
    .hero-dot{width:8px;height:8px;border-radius:50%;background:#4ade80}
    .hero-title{font-family:'Frank Ruhl Libre',serif;font-size:40px;font-weight:900;color:white;line-height:.92;letter-spacing:-1px;text-shadow:0 2px 16px rgba(0,0,0,.4);}
    .hero-title span{font-family:'Rubik',sans-serif;color:var(--gold);letter-spacing:-.6px;}
    .hero-sub{color:rgba(255,255,255,.72);font-size:13px;font-weight:400;margin-top:6px}

    .stats-row{display:flex;gap:10px;padding:0 14px;margin:-18px 0 10px;position:relative;z-index:5;}
    .stat{flex:1;background:var(--card);border-radius:16px;padding:14px 12px;box-shadow:0 4px 20px rgba(0,0,0,.08);border-top:3px solid transparent;animation:fade .4s ease both;}
    .stat:nth-child(1){border-top-color:var(--blue)} .stat:nth-child(2){border-top-color:var(--mint)} .stat:nth-child(3){border-top-color:var(--gold)}
    .stat-num{font-size:30px;font-weight:900;color:var(--ink);line-height:1}
    .stat-lbl{font-size:10px;font-weight:800;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.04em}

    .sec-head{display:flex;justify-content:space-between;align-items:center;padding:0 14px;margin:12px 0 12px}
    .sec-title{font-size:13px;font-weight:900;color:var(--ink);display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:.06em}
    .sec-title::before{content:'';width:3px;height:16px;background:var(--blue);border-radius:2px;display:block}

    #eCards{display:grid;grid-template-columns:1fr;gap:10px;padding:0 14px 18px;}
    @media(min-width:900px){.containerWide{max-width:1100px;margin:0 auto}#eCards{grid-template-columns:repeat(2,1fr)}}
    @media(min-width:1200px){#eCards{grid-template-columns:repeat(3,1fr)}}

    .ecard{background:var(--card);border-radius:18px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid var(--border);display:flex;align-items:stretch;overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;animation:fade .25s ease both;}
    .ecard:active{transform:scale(.98)}
    .ecard-accent{width:5px;flex-shrink:0;background:var(--blue)}
    .ecard-accent.mine{background:var(--mint)} .ecard-accent.done{background:#d1d5db}
    .ecard-date{width:60px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 0;border-left:1px solid var(--border);background:#fafbfc;}
    .ecard-date .day{font-size:26px;font-weight:900;color:var(--ink);line-height:1}
    .ecard-date .day.range{font-size:16px;font-weight:900;color:var(--blue);line-height:1.1}
    .ecard-date .mon{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;margin-top:2px}
    .ecard-body{flex:1;padding:14px 14px 14px 12px;min-width:0}
    .ecard-title{font-size:15px;font-weight:800;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px}
    .ecard-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .ecard-owner{font-size:11px;color:var(--muted);font-weight:700}

    .pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:.02em;white-space:nowrap}
    .pill-wip{background:#fef3c7;color:#92400e} .pill-done{background:#d1fae5;color:#065f46} .pill-wait{background:#f3f4f6;color:#4b5563}

    .navTop{margin:6px 14px 0;background:rgba(13,27,42,.82);border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(10px);border-radius:22px;display:flex;gap:8px;justify-content:space-between;align-items:center;padding:6px;box-shadow:0 8px 26px rgba(13,27,42,.22);}
    .nb{flex:1;padding:10px;border-radius:18px;color:rgba(255,255,255,.72);display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px;font-weight:900;letter-spacing:.04em;background:none;border:none;cursor:pointer;transition:all .2s;text-transform:uppercase;}
    .nb .ico{font-size:20px;line-height:1}
    .nb.on{color:white;background:rgba(255,255,255,.14)}
    .nbAdd{background:var(--gold);color:var(--ink);padding:12px;border-radius:18px;border:2px solid rgba(0,0,0,.35);cursor:pointer;transition:all .18s;min-width:52px;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;}
    .nbAdd:active{transform:scale(.93)}
    .badge{position:absolute;top:6px;right:10px;width:8px;height:8px;background:var(--danger);border-radius:50%;border:2px solid rgba(13,27,42,1)}

    .ov{position:fixed;inset:0;background:rgba(13,27,42,.7);display:flex;align-items:flex-end;justify-content:center;z-index:150;backdrop-filter:blur(6px);}
    @media(min-width:768px){.ov{align-items:center;padding:20px}}
    .sh{background:var(--card);width:100%;max-width:560px;border-radius:28px 28px 0 0;display:flex;flex-direction:column;max-height:92vh;animation:pop .22s ease both;box-shadow:0 -8px 48px rgba(13,27,42,.25);overflow-y:auto;}
    @media(min-width:768px){.sh{border-radius:28px;max-height:86vh}}
    .sh-head{padding:16px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0;position:sticky;top:0;background:white;z-index:10;}
    .sh-title{font-size:18px;font-weight:900;color:var(--ink)}
    .close-btn{width:34px;height:34px;border-radius:50%;background:#f1f5f9;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;}

    .fld{width:100%;padding:12px 14px;background:#f8fafc;border-radius:12px;border:1.5px solid var(--border);outline:none;font-family:'Heebo',sans-serif;font-size:14px;color:var(--ink);transition:all .2s;}
    .fld:focus{border-color:var(--blue);background:white;box-shadow:0 0 0 3px rgba(0,87,168,.1)}
    label.lbl{font-size:10px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:6px}

    .tTab{flex:1;padding:10px 12px;border-radius:14px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;font-weight:900;font-size:12px;color:var(--muted);}
    .tTab.on{border-color:var(--blue);color:var(--blue);background:#eff6ff}
    .taskTabs{display:flex;gap:8px;padding:0 14px;margin-top:10px;}

    .tr{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:#f8fafc;border-radius:10px;border:1px solid var(--border);}
    .tr input[type=checkbox]{width:18px;height:18px;accent-color:var(--blue);cursor:pointer;flex-shrink:0;margin-top:2px}
    .tr.done span{text-decoration:line-through;color:var(--muted)}
    .tMeta{font-size:10px;font-weight:800;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}

    .btnMini{font-size:11px;font-weight:900;color:var(--blue);background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:7px 10px;cursor:pointer;font-family:'Heebo',sans-serif;}
    .btnMain{width:100%;background:var(--ink);color:white;padding:15px;border-radius:14px;font-weight:900;font-size:15px;border:none;cursor:pointer;font-family:'Heebo',sans-serif;box-shadow:0 4px 18px rgba(13,27,42,.35);letter-spacing:.03em;}

    .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:16px;z-index:99999;background:rgba(13,27,42,.92);color:white;padding:10px 14px;border-radius:14px;font-size:12px;font-weight:800;display:none;max-width:92vw;}

    .cal-cell{background:white;border:1px solid var(--border);border-radius:12px;min-height:62px;padding:6px;font-weight:900;font-size:11px;position:relative;overflow:hidden;}
    .cal-empty{min-height:62px;border-radius:12px;}
  </style>
</head>
<body>
  <div id="ldr"><div class="ring"></div><p>BAT YAM 100</p></div>

  <div id="app" style="display:none">
    <div class="topWrap">
      <div class="hero containerWide">
        <div class="hero-bg"></div>
        <div class="hero-c">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <button id="btnUser" class="glass-pill">
              <span class="hero-dot"></span>
              <span id="uLabel">אורח</span>
              <span style="opacity:.7;font-size:12px">▾</span>
            </button>
            <button id="btnRefresh" class="glass-ic">🔄</button>
          </div>
          <div>
            <div class="hero-title">BAT YAM<br><span>100</span></div>
            <p class="hero-sub">ניהול פרויקטים עירוני · 2026</p>
          </div>
        </div>
        <div class="hero-stripe"></div>
      </div>

      <div class="navTop containerWide">
        <button id="nb-list" class="nb on"><span class="ico">🏠</span><span>בית</span></button>
        <button id="nb-tasks" class="nb" style="position:relative"><span class="ico">✅</span><span>משימות</span><span id="tbadge" class="badge" style="display:none"></span></button>
        <button id="nb-add" class="nbAdd">＋</button>
        <button id="nb-cal" class="nb"><span class="ico">📅</span><span>לוח שנה</span></button>
        <button id="nb-set" class="nb"><span class="ico">👤</span><span>פרופיל</span></button>
      </div>

      <div class="stats-row containerWide">
        <div class="stat"><div id="stT" class="stat-num">0</div><div class="stat-lbl">פרויקטים</div></div>
        <div class="stat"><div id="stM" class="stat-num">0</div><div class="stat-lbl">שלי</div></div>
        <div class="stat"><div id="stA" class="stat-num">0</div><div class="stat-lbl">פתוחים</div></div>
      </div>
    </div>

    <div id="vList" class="containerWide">
      <div class="sec-head">
        <span class="sec-title">כל הפרויקטים</span>
        <span id="countBadge" style="font-size:11px;font-weight:800;color:var(--muted)"></span>
      </div>
      <div id="eCards"></div>
      <div style="height:18px"></div>
    </div>

    <div id="vCal" style="display:none" class="containerWide">
      <div class="sec-head" style="margin-top:6px">
        <span class="sec-title">לוח שנה</span>
        <div style="display:flex;gap:8px">
          <button id="calP" class="btnMini">›</button>
          <button id="calN" class="btnMini">‹</button>
        </div>
      </div>
      <div id="calTit" style="padding:0 14px 10px;font-weight:900"></div>
      <div style="padding:0 14px">
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center;font-size:9px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px">
          <div>א׳</div><div>ב׳</div><div>ג׳</div><div>ד׳</div><div>ה׳</div><div>ו׳</div><div>ש׳</div>
        </div>
        <div id="calG" style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding-bottom:18px"></div>
      </div>
    </div>

    <div id="vTasks" style="display:none" class="containerWide">
      <div class="sec-head">
        <span class="sec-title">משימות</span>
        <select id="tFilter" class="fld" style="width:auto;font-size:12px;font-weight:900;padding:9px 10px;cursor:pointer"><option value="">כולם</option></select>
      </div>
      <div class="taskTabs">
        <button id="tabDoing" class="tTab on">בביצוע</button>
        <button id="tabDone"  class="tTab">בוצעו</button>
      </div>
      <div id="tCards" style="display:flex;flex-direction:column;gap:10px;padding:12px 14px 18px"></div>
    </div>
  </div>

  <div id="mView" class="ov" style="display:none"></div>
  <div id="toast" class="toast"></div>

<script>
  /* CONFIG */
  const BASE = "https://script.google.com/macros/s/AKfycbz1nTdeJO9wI4RgUBExrD2KEZnKbVp19IlJVFnxGEzWRfJpldH83-G158ymHgK_Pm_Lwg/exec";
  const ALWAYS_ASK_WHO = true;

  let events = [];
  let me = localStorage.getItem('batyam_user') || '';
  let activeEvent = null;
  let viewTaskMode = 'doing';
  let calY = 2026, calM = 5;

  const $ = id => document.getElementById(id);

  /* ✅ מחכים שה-DOM נטען, בלי תלות ב-lucide */
  document.addEventListener('DOMContentLoaded', async () => {
    $('uLabel').textContent = me || 'אורח';
    bindNav_();
    bindCal_();
    $('btnRefresh').addEventListener('click', () => loadAll_(true));
    $('tabDoing').addEventListener('click', () => { viewTaskMode='doing'; setTabs_(); renderTasksHub_(); });
    $('tabDone').addEventListener('click',  () => { viewTaskMode='done';  setTabs_(); renderTasksHub_(); });

    await loadAll_(false);
    await ensureUser_();
    hideLoader_();
    $('app').style.display = 'block';
  });

  function toast_(msg){
    const t=$('toast'); t.textContent=msg; t.style.display='block';
    clearTimeout(window.__tt);
    window.__tt=setTimeout(()=>t.style.display='none',2600);
  }
  function hideLoader_(){
    const l=$('ldr'); l.style.opacity='0';
    setTimeout(()=>l.style.display='none',450);
  }

  function bindNav_(){
    const show=v=>{
      $('vList').style.display  = v==='list'  ? '' : 'none';
      $('vCal').style.display   = v==='cal'   ? '' : 'none';
      $('vTasks').style.display = v==='tasks' ? '' : 'none';
      $('nb-list').classList.toggle('on',  v==='list');
      $('nb-cal').classList.toggle('on',   v==='cal');
      $('nb-tasks').classList.toggle('on', v==='tasks');
    };
    $('nb-list').addEventListener('click', ()=>show('list'));
    $('nb-cal').addEventListener('click',  ()=>{ show('cal'); renderCalendar_(); });
    $('nb-tasks').addEventListener('click',()=>{ show('tasks'); renderTasksHub_(); });
    $('btnUser').addEventListener('click', async ()=>{ await showUserPicker_(getOwnersFromEvents_()); });
    $('nb-add').addEventListener('click',  ()=>toast_('הוספת פרויקט — בקרוב! כרגע עדכן ישירות בשיט.'));
    $('nb-set').addEventListener('click',  ()=>{ showUserPicker_(getOwnersFromEvents_()); });
  }
  function bindCal_(){
    $('calP').addEventListener('click',()=>{ calM--; if(calM<0){calM=11;calY--;} renderCalendar_(); });
    $('calN').addEventListener('click',()=>{ calM++; if(calM>11){calM=0;calY++;} renderCalendar_(); });
  }

  /* DATA */
  async function loadAll_(forceToast){
    try{
      const url = BASE+'?action=list&_='+Date.now();
      const res = await fetch(url);
      const j   = await res.json();
      if(!j.ok) throw new Error(j.error||'Load failed');
      events = (j.rows||[]).map(normRow_);
      renderAll_();
      if(forceToast) toast_('עודכן ✅');
    }catch(err){
      console.error(err);
      toast_('שגיאה: '+err.message);
    }
  }

  function normRow_(r){
    const o={...r};
    o.ID    = String(o.ID||o.id||'').trim();
    o.Title = String(o.Title||o.title||'').trim();
    o.owner = String(o.owner||o.Owner||'').trim();
    o.status= String(o.status||o.Status||'').trim();
    o.date  = o.date||o.Date||'';
    o.Description = String(o.Description||o.desc||'').trim();
    o.notes = String(o.notes||o.Notes||'').trim();
    o.targetAudience = String(o["Target Audience"]||o.targetAudience||'').trim();
    o.image = String(o.image||o.Image||'').trim();
    o._tasks = parseTasks_(o.tasks);
    return o;
  }

  function parseTasks_(cell){
    const s=String(cell??'').trim();
    if(!s) return [];
    if(s.startsWith('[')){
      try{
        const arr=JSON.parse(s);
        if(Array.isArray(arr)) return arr.map(t=>({
          id:t.id||'t_'+Math.random().toString(16).slice(2),
          text:String(t.text||t.title||'').trim(),
          done:!!t.done, createdAt:t.createdAt||'', doneAt:t.doneAt||''
        })).filter(x=>x.text);
      }catch(e){}
    }
    const parts = s.includes('|') ? s.split('|') : s.includes('\n') ? s.split(/\r?\n/) : s.includes(',') ? s.split(',') : [s];
    return parts.map(x=>x.trim()).filter(Boolean).map(txt=>({
      id:'t_'+Math.random().toString(16).slice(2), text:txt, done:false, createdAt:'', doneAt:''
    }));
  }

  function renderAll_(){
    renderCards_(); renderStats_(); renderCalendar_();
    buildTasksFilter_(); renderTasksHub_(); updateBadge_(); setTabs_();
  }

  function renderStats_(){
    $('stT').textContent = events.length;
    $('stM').textContent = me ? events.filter(e=>(e.owner||'').includes(me)).length : 0;
    $('stA').textContent = events.filter(e=>(e._tasks||[]).some(t=>!t.done)).length;
    $('countBadge').textContent = 'סה״כ: '+events.length;
    $('uLabel').textContent = me||'אורח';
  }

  function pillForStatus_(s){
    const v=String(s||'').trim();
    if(!v) return `<span class="pill pill-wait">ללא סטטוס</span>`;
    if(v.includes('בתהליך')||v.includes('תמחור')||v.includes('חוזים')||v.includes('הזמנת')) return `<span class="pill pill-wip">${esc_(v)}</span>`;
    if(v.includes('בוצע')||v.includes('הסתיים')||v.includes('סגור')) return `<span class="pill pill-done">${esc_(v)}</span>`;
    return `<span class="pill pill-wait">${esc_(v)}</span>`;
  }

  function renderCards_(){
    const wrap=$('eCards'); wrap.innerHTML='';
    const sorted=[...events].sort((a,b)=>{
      const da=parseDate_(String(a.date||''))?.getTime()??9e15;
      const db=parseDate_(String(b.date||''))?.getTime()??9e15;
      if(da!==db) return da-db;
      return String(a.Title||'').localeCompare(String(b.Title||''),'he');
    });
    sorted.forEach(e=>{
      const ac=(me&&(e.owner||'').includes(me))?'mine':'';
      const dc=(e._tasks||[]).length&&(e._tasks||[]).every(t=>t.done)?'done':'';
      const {dayTxt,monTxt,isRange}=dateBadge_(e.date);
      const card=document.createElement('div');
      card.className='ecard';
      card.innerHTML=`
        <div class="ecard-accent ${ac} ${dc}"></div>
        <div class="ecard-date">
          <div class="day ${isRange?'range':''}">${dayTxt}</div>
          <div class="mon">${monTxt}</div>
        </div>
        <div class="ecard-body">
          <div class="ecard-title">${esc_(e.Title||'(ללא כותרת)')}</div>
          <div class="ecard-meta">${pillForStatus_(e.status)}<span class="ecard-owner">${esc_(e.owner||'')}</span></div>
          ${e.Description?`<div style="margin-top:8px;color:var(--muted);font-size:12px;line-height:1.25">${esc_(e.Description)}</div>`:''}
        </div>`;
      card.addEventListener('click',()=>openEvent_(e.ID));
      wrap.appendChild(card);
    });
  }

  function dateBadge_(raw){
    const s=String(raw||'').trim();
    if(!s) return {dayTxt:'—',monTxt:'תאריך',isRange:false};
    const d=parseDate_(s);
    if(!d) return {dayTxt:'—',monTxt:'תאריך',isRange:false};
    return {dayTxt:String(d.getDate()),monTxt:['ינו','פבר','מרץ','אפר','מאי','יונ','יול','אוג','ספט','אוק','נוב','דצמ'][d.getMonth()],isRange:false};
  }

  function parseDate_(s){
    const raw=String(s||'').trim(); if(!raw) return null;
    let d=new Date(raw); if(!isNaN(d.getTime())&&raw.includes('-')) return d;
    let m=raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if(m){ d=new Date(+m[3],+m[2]-1,+m[1]); return isNaN(d.getTime())?null:d; }
    m=raw.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
    if(m){ d=new Date(+m[3],+m[2]-1,+m[1]); return isNaN(d.getTime())?null:d; }
    m=raw.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
    if(m){ d=new Date(+m[1],+m[2]-1,+m[3]); return isNaN(d.getTime())?null:d; }
    return null;
  }

  function parseDateRange_(s){
    const raw=String(s||'').trim(); if(!raw) return {start:null,end:null};
    const parts=raw.split(/\s*-\s*/);
    if(parts.length>=2){
      const a=parseDate_(parts[0]),b=parseDate_(parts[1]);
      if(a&&b){ const start=a<=b?a:b,end=a<=b?b:a; return {start,end}; }
    }
    const single=parseDate_(raw); return {start:single,end:single};
  }

  function eventHitsDay_(dateCell,y,m,day){
    const {start,end}=parseDateRange_(dateCell); if(!start||!end) return false;
    const cell=new Date(y,m,day);
    const s=new Date(start.getFullYear(),start.getMonth(),start.getDate());
    const e=new Date(end.getFullYear(),end.getMonth(),end.getDate(),23,59,59);
    const c0=new Date(y,m,day),c1=new Date(y,m,day,23,59,59);
    return s<=c1&&e>=c0;
  }

  /* WHO */
  function getOwnersFromEvents_(){
    const set=new Set();
    events.forEach(e=>String(e.owner||'').split(/[,;/|]+/).map(x=>x.trim()).filter(Boolean).forEach(n=>set.add(n)));
    return Array.from(set).sort((a,b)=>a.localeCompare(b,'he'));
  }

  function showUserPicker_(owners){
    return new Promise(resolve=>{
      const m=$('mView'); m.style.display='flex';
      m.innerHTML=`
        <div class="sh">
          <div class="sh-head">
            <div class="sh-title">מי אתה?</div>
            <button class="close-btn" id="whoClose">✕</button>
          </div>
          <div style="padding:18px">
            <label class="lbl">בחר שם</label>
            <select id="whoSel" class="fld" style="cursor:pointer">
              ${owners.length
                ? owners.map(o=>`<option value="${esc_(o)}">${esc_(o)}</option>`).join('')
                : `<option value="">(אין שמות בעמודת OWNER)</option>`}
            </select>
            <div style="margin-top:12px">
              <button id="whoOk" class="btnMain">המשך ▶</button>
            </div>
            <p style="margin-top:10px;color:var(--muted);font-size:12px;font-weight:800;line-height:1.4">אם השם שלך לא מופיע — וודא שהוא בעמודת OWNER בשיט.</p>
          </div>
        </div>`;

      const close=()=>{ m.style.display='none'; m.innerHTML=''; resolve(me||''); };
      $('whoClose').addEventListener('click',close);
      m.addEventListener('click',ev=>{ if(ev.target===m) close(); });

      const sel=$('whoSel');
      if(me&&owners.includes(me)) sel.value=me;

      $('whoOk').addEventListener('click',()=>{
        me=String(sel.value||'').trim();
        localStorage.setItem('batyam_user',me);
        $('uLabel').textContent=me||'אורח';
        renderAll_(); close();
      });
    });
  }

  async function ensureUser_(){
    const owners=getOwnersFromEvents_();
    if(!owners.length){ $('uLabel').textContent=me||'אורח'; return; }
    if(!ALWAYS_ASK_WHO&&me&&owners.includes(me)){ $('uLabel').textContent=me; return; }
    await showUserPicker_(owners);
  }

  /* EVENT MODAL */
  function openEvent_(id){
    const e=events.find(x=>x.ID===id);
    if(!e){ toast_('לא נמצא'); return; }
    activeEvent={...JSON.parse(JSON.stringify(e)),_tasks:(e._tasks||[]).map(t=>({...t}))};
    renderEventModal_();
  }

  function closeModal_(){ $('mView').style.display='none'; $('mView').innerHTML=''; activeEvent=null; }

  function renderEventModal_(){
    const e=activeEvent, m=$('mView');
    m.style.display='flex';
    m.innerHTML=`
      <div class="sh">
        <div class="sh-head">
          <div>
            <div class="sh-title">${esc_(e.Title||'פרויקט')}</div>
            <div style="margin-top:2px;color:var(--muted);font-size:12px;font-weight:800">${esc_(e.ID)}</div>
          </div>
          <button class="close-btn" id="xClose">✕</button>
        </div>
        <div style="padding:14px 14px 0">
          <div style="display:flex;gap:10px;flex-wrap:wrap">
            <div style="flex:1;min-width:160px"><label class="lbl">סטטוס</label><input id="fStatus" class="fld" value="${esc_(e.status||'')}" placeholder="בתהליך..."/></div>
            <div style="flex:1;min-width:160px"><label class="lbl">אחראי</label><input id="fOwner" class="fld" value="${esc_(e.owner||'')}" placeholder="גלית..."/></div>
          </div>
          <div style="margin-top:10px"><label class="lbl">תיאור</label><textarea id="fDesc" class="fld" rows="3">${esc_(e.Description||'')}</textarea></div>
          <div style="margin-top:10px"><label class="lbl">קהל יעד</label><input id="fTA" class="fld" value="${esc_(e.targetAudience||'')}" placeholder="כולם..."/></div>
          <div class="taskTabs" style="margin-top:12px;padding:0">
            <button id="mTabDoing" class="tTab ${viewTaskMode==='doing'?'on':''}">בביצוע</button>
            <button id="mTabDone"  class="tTab ${viewTaskMode==='done'?'on':''}">בוצעו</button>
          </div>
          <div style="margin-top:10px;display:flex;gap:8px">
            <input id="newTaskText" class="fld" placeholder="הוסף משימה..."/>
            <button id="btnAddTask" class="btnMini" style="white-space:nowrap">הוסף</button>
          </div>
          <div id="taskList" style="display:flex;flex-direction:column;gap:8px;margin-top:10px;padding-bottom:10px"></div>
          <div style="display:flex;gap:10px;margin:10px 0 16px"><button id="btnSaveTasks" class="btnMain">שמור משימות</button></div>
          <div style="display:flex;gap:10px;margin:0 0 18px">
            <button id="btnSaveFields" class="btnMini">שמור שדות</button>
            <button id="btnReload" class="btnMini">רענן מהשיט</button>
          </div>
        </div>
      </div>`;

    $('xClose').addEventListener('click',closeModal_);
    m.addEventListener('click',ev=>{ if(ev.target===m) closeModal_(); });
    $('mTabDoing').addEventListener('click',()=>{ viewTaskMode='doing'; renderEventModal_(); });
    $('mTabDone').addEventListener('click', ()=>{ viewTaskMode='done';  renderEventModal_(); });
    $('btnAddTask').addEventListener('click',addTask_);
    $('newTaskText').addEventListener('keydown',ev=>{ if(ev.key==='Enter'){ev.preventDefault();addTask_();} });
    $('btnSaveTasks').addEventListener('click',saveTasks_);
    $('btnSaveFields').addEventListener('click',saveFields_);
    $('btnReload').addEventListener('click',async()=>{ await loadAll_(true); closeModal_(); });
    renderTasksInsideModal_();
  }

  function addTask_(){
    const inp=$('newTaskText'), txt=String(inp.value||'').trim(); if(!txt) return;
    activeEvent._tasks.unshift({id:'t_'+Math.random().toString(16).slice(2),text:txt,done:false,createdAt:new Date().toISOString(),doneAt:''});
    inp.value=''; renderTasksInsideModal_(); updateBadge_();
  }

  function renderTasksInsideModal_(){
    const list=$('taskList'); if(!list) return;
    const tasks=activeEvent._tasks||[];
    const filtered=viewTaskMode==='doing'?tasks.filter(t=>!t.done):tasks.filter(t=>t.done);
    list.innerHTML=filtered.length?'':`<div style="color:var(--muted);font-weight:800;font-size:12px;padding:10px 6px">אין משימות</div>`;
    filtered.forEach(t=>{
      const row=document.createElement('div'); row.className='tr '+(t.done?'done':'');
      row.innerHTML=`<input type="checkbox" ${t.done?'checked':''}/>
        <div style="flex:1"><span style="font-weight:900;font-size:13px">${esc_(t.text)}</span>
        <div class="tMeta">${t.createdAt?`<span>נוצר: ${shortDate_(t.createdAt)}</span>`:''} ${t.doneAt?`<span>בוצע: ${shortDate_(t.doneAt)}</span>`:''}</div></div>`;
      row.querySelector('input').addEventListener('change',ev=>{
        const idx=(activeEvent._tasks||[]).findIndex(x=>x.id===t.id);
        if(idx>=0){ activeEvent._tasks[idx].done=!!ev.target.checked; activeEvent._tasks[idx].doneAt=ev.target.checked?new Date().toISOString():''; renderTasksInsideModal_(); updateBadge_(); }
      });
      list.appendChild(row);
    });
  }

  function shortDate_(iso){ try{ return new Date(iso).toLocaleDateString('he-IL'); }catch(e){ return String(iso); } }

  async function saveTasks_(){
    try{
      const p=new URLSearchParams(); p.set('action','updateTasks'); p.set('id',activeEvent.ID); p.set('tasks',JSON.stringify(activeEvent._tasks||[]));
      const j=await(await fetch(BASE,{method:'POST',body:p})).json();
      if(!j.ok) throw new Error(j.error||'Save failed');
      toast_('נשמר ✅'); await loadAll_(false); closeModal_();
    }catch(err){ toast_('שגיאה: '+err.message); }
  }

  async function saveFields_(){
    try{
      await updateField_(activeEvent.ID,'status',$('fStatus').value);
      await updateField_(activeEvent.ID,'owner',$('fOwner').value);
      await updateField_(activeEvent.ID,'Description',$('fDesc').value);
      await updateField_(activeEvent.ID,'Target Audience',$('fTA').value);
      toast_('עודכן ✅'); await loadAll_(false); closeModal_();
    }catch(err){ toast_('שגיאה: '+err.message); }
  }

  async function updateField_(id,field,value){
    const p=new URLSearchParams(); p.set('action','updateField'); p.set('id',id); p.set('field',field); p.set('value',value);
    const j=await(await fetch(BASE,{method:'POST',body:p})).json();
    if(!j.ok) throw new Error(j.error||'Update failed');
    return j;
  }

  /* TASKS HUB */
  function buildTasksFilter_(){
    const sel=$('tFilter'), owners=new Set();
    events.forEach(e=>{ if(e.owner) owners.add(e.owner.trim()); });
    const cur=sel.value||'';
    sel.innerHTML=[''].concat(Array.from(owners).sort((a,b)=>a.localeCompare(b,'he'))).map(v=>`<option value="${esc_(v)}">${v||'כולם'}</option>`).join('');
    sel.value=cur; sel.onchange=()=>renderTasksHub_();
  }

  function renderTasksHub_(){
    const wrap=$('tCards'); if(!wrap) return;
    wrap.innerHTML='';
    const who=$('tFilter').value||'';
    let all=[];
    events.forEach(e=>(e._tasks||[]).forEach(t=>all.push({eventId:e.ID,title:e.Title,owner:e.owner,task:t})));
    if(who) all=all.filter(x=>String(x.owner||'').includes(who));
    all=viewTaskMode==='doing'?all.filter(x=>!x.task.done):all.filter(x=>x.task.done);
    if(!all.length){ wrap.innerHTML=`<div style="color:var(--muted);font-weight:900;padding:10px 4px">אין משימות</div>`; updateBadge_(); return; }
    all.forEach(x=>{
      const div=document.createElement('div'); div.className='ecard'; div.style.cursor='pointer';
      div.innerHTML=`<div class="ecard-accent ${x.task.done?'done':''}"></div>
        <div class="ecard-body">
          <div class="ecard-title">${esc_(x.task.text)}</div>
          <div class="ecard-meta"><span class="pill pill-wip">${esc_(x.title||'')}</span>${x.owner?`<span class="ecard-owner">${esc_(x.owner)}</span>`:''}</div>
        </div>`;
      div.addEventListener('click',()=>openEvent_(x.eventId));
      wrap.appendChild(div);
    });
    updateBadge_(); setTabs_();
  }

  function setTabs_(){ $('tabDoing').classList.toggle('on',viewTaskMode==='doing'); $('tabDone').classList.toggle('on',viewTaskMode==='done'); }
  function updateBadge_(){ const n=events.reduce((s,e)=>s+((e._tasks||[]).filter(t=>!t.done).length),0); $('tbadge').style.display=n>0?'':'none'; }

  /* CALENDAR */
  function renderCalendar_(){
    const title=$('calTit'),grid=$('calG'); if(!title||!grid) return;
    title.textContent=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'][calM]+' '+calY;
    grid.innerHTML='';
    const startDay=new Date(calY,calM,1).getDay();
    const dim=new Date(calY,calM+1,0).getDate();
    for(let i=0;i<startDay;i++){ const d=document.createElement('div'); d.className='cal-empty'; grid.appendChild(d); }
    for(let d=1;d<=dim;d++){
      const hits=events.filter(e=>eventHitsDay_(String(e.date||''),calY,calM,d));
      grid.appendChild(dayCell_(String(d),hits));
    }
  }

  function dayCell_(label,hits){
    const div=document.createElement('div'); div.className='cal-cell';
    const day=document.createElement('div'); day.textContent=label; div.appendChild(day);
    if(hits&&hits.length){
      const t=document.createElement('div');
      t.style.cssText='margin-top:4px;font-size:9px;font-weight:900;color:var(--muted);line-height:1.15;overflow:hidden;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2';
      t.textContent=hits.slice(0,2).map(x=>x.Title).join(' · ')+(hits.length>2?` · ועוד ${hits.length-2}`:'');
      div.appendChild(t);
      const dot=document.createElement('div');
      dot.style.cssText='position:absolute;bottom:6px;left:8px;width:8px;height:8px;border-radius:50%;background:var(--gold)';
      div.appendChild(dot);
      div.style.cursor='pointer';
      div.addEventListener('click',()=>openEvent_(hits[0].ID));
    }
    return div;
  }

  /* UTILS */
  function esc_(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }
</script>
</body>
