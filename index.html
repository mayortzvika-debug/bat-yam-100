<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bat Yam 100</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Heebo',sans-serif; background:#f4f6f9; direction:rtl; }
#ldr { position:fixed; inset:0; background:#0d1b2a; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
.ring { width:50px; height:50px; border:3px solid rgba(255,255,255,.15); border-top-color:#f5a623; border-radius:50%; animation:spin 1s linear infinite; margin-bottom:15px; }
@keyframes spin { to { transform:rotate(360deg); } }
#ldr p { color:rgba(255,255,255,.5); font-size:11px; letter-spacing:.2em; }
#app { display:none; padding:20px; max-width:600px; margin:0 auto; }
.card { background:white; border-radius:16px; padding:16px; margin-bottom:12px; box-shadow:0 2px 10px rgba(0,0,0,.06); border-right:4px solid #0057a8; }
.card h3 { font-size:15px; font-weight:700; margin-bottom:6px; }
.badge { display:inline-block; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:700; }
</style>
</head>
<body>
<div id="ldr"><div class="ring"></div><p>טוען נתונים...</p></div>
<div id="app">
  <h1 style="font-size:28px;font-weight:900;margin-bottom:4px">BAT YAM <span style="color:#f5a623">100</span></h1>
  <p id="subtitle" style="color:#7a8899;font-size:13px;margin-bottom:20px"></p>
  <div id="cards"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ02cU8av1KtchNykwq-QxjU6LiLZx-CSp5B28BxAgnsvJjlTwMMW1QO8qNylEYC78qDQFT_S3-fzUA/pub?output=tsv";

function getColor(s) {
  if(!s) return {bg:'#e2e8f0',color:'#475569'};
  if(s.includes('תהליך') || s.includes('חוזים')) return {bg:'#d1fae5',color:'#065f46'};
  if(s.includes('ממתין')) return {bg:'#f3e8ff',color:'#6b21a8'};
  if(s.includes('תמחור') || s.includes('תומחר')) return {bg:'#fee2e2',color:'#991b1b'};
  if(s.includes('תואם')) return {bg:'#dbeafe',color:'#1e40af'};
  return {bg:'#fef3c7',color:'#92400e'};
}

async function load() {
  try {
    const res = await fetch(CSV_URL + '&t=' + Date.now());
    const text = await res.text();
    Papa.parse(text, {
      header: true, delimiter: '\t', skipEmptyLines: true,
      complete: function(result) {
        const data = result.data.filter(r => (r.Title || '').trim());
        document.getElementById('subtitle').innerText = data.length + ' פרויקטים';
        const cards = document.getElementById('cards');
        data.forEach(row => {
          const c = getColor(row.status || '');
          const tasks = (row.tasks || '').split('|').filter(t=>t.trim());
          const div = document.createElement('div');
          div.className = 'card';
          div.innerHTML =
            '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">' +
              '<h3>' + (row.Title||'') + '</h3>' +
              '<span class="badge" style="background:' + c.bg + ';color:' + c.color + '">' + (row.status||'') + '</span>' +
            '</div>' +
            '<p style="font-size:12px;color:#7a8899;margin-top:4px">📅 ' + (row.date||'ללא תאריך') + ' | 👤 ' + (row.owner||'-') + '</p>' +
            (row.notes ? '<p style="font-size:12px;color:#334155;margin-top:6px;line-height:1.5">' + row.notes + '</p>' : '') +
            (tasks.length ? '<div style="margin-top:8px">' + tasks.map(t=>'<div style="font-size:12px;color:#334155;padding:2px 0">▪ ' + t + '</div>').join('') + '</div>' : '');
          cards.appendChild(div);
        });
        document.getElementById('ldr').style.display = 'none';
        document.getElementById('app').style.display = 'block';
      }
    });
  } catch(e) {
    document.getElementById('ldr').innerHTML = '<p style="color:red;padding:20px">שגיאה: ' + e.message + '</p>';
  }
}
load();
</script>
</body>
</html>
